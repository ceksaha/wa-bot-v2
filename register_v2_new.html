<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Daftar UMKM Baru | WA Order Bot V2</title>
    <link rel="stylesheet" href="css/style.css">
    <style>
        :root {
            --glass: rgba(255, 255, 255, 0.05);
            --glass-border: rgba(255, 255, 255, 0.1);
        }
        body {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background: #0f172a; /* Dark background */
            font-family: 'Outfit', sans-serif;
            color: #fff;
            padding: 2rem;
            margin: 0;
            overflow-y: auto;
        }
        .login-card {
            background: var(--glass);
            backdrop-filter: blur(25px);
            -webkit-backdrop-filter: blur(25px);
            border: 1px solid var(--glass-border);
            padding: 2.5rem;
            border-radius: 2rem;
            width: 100%;
            max-width: 450px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.7);
            animation: fadeIn 0.8s ease-out;
        }
        .login-header {
            text-align: center;
            margin-bottom: 2rem;
        }
        .login-header h1 {
            font-size: 2rem;
            margin-bottom: 0.5rem;
            background: linear-gradient(to right, #10b981, #3b82f6);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        .login-header p {
            color: #94a3b8;
            font-size: 0.9rem;
        }
        .form-group {
            margin-bottom: 1.25rem;
        }
        label {
            display: block;
            margin-bottom: 0.5rem;
            font-size: 0.875rem;
            font-weight: 500;
            color: #e2e8f0;
        }
        input {
            width: 100%;
            padding: 0.875rem 1rem;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 0.75rem;
            color: #fff;
            font-family: inherit;
            font-size: 1rem;
            transition: all 0.2s;
        }
        input:focus {
            outline: none;
            border-color: #10b981;
            background: rgba(255, 255, 255, 0.1);
            box-shadow: 0 0 0 4px rgba(16, 185, 129, 0.1);
        }
        .btn-register {
            width: 100%;
            padding: 1rem;
            background: #10b981;
            border: none;
            border-radius: 0.75rem;
            color: #fff;
            font-size: 1rem;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.2s;
            margin-top: 1rem;
            box-shadow: 0 4px 6px -1px rgba(16, 185, 129, 0.3);
        }
        .btn-register:hover {
            background: #059669;
            transform: translateY(-2px);
            box-shadow: 0 10px 15px -3px rgba(16, 185, 129, 0.4);
        }
        .btn-register:active {
            transform: translateY(0);
        }
        .error-msg, .success-msg {
            padding: 0.875rem;
            border-radius: 0.75rem;
            font-size: 0.875rem;
            margin-bottom: 1.5rem;
            display: none;
            text-align: center;
        }
        .error-msg {
            background: rgba(239, 68, 68, 0.15);
            color: #f87171;
            border: 1px solid rgba(239, 68, 68, 0.2);
        }
        .success-msg {
            background: rgba(16, 185, 129, 0.15);
            color: #34d399;
            border: 1px solid rgba(16, 185, 129, 0.2);
        }
        .footer-link {
            text-align: center;
            margin-top: 1.5rem;
            font-size: 0.875rem;
            color: #94a3b8;
        }
        .footer-link a {
            color: #10b981;
            text-decoration: none;
            font-weight: 600;
        }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body>
    <div class="login-card">
        <div class="login-header">
            <h1>Daftar UMKM</h1>
            <p>Mulai jualan otomatis dengan WhatsApp Bot</p>
        </div>
        
        <div id="errorMsg" class="error-msg"></div>
        <div id="successMsg" class="success-msg"></div>

        <form id="registerForm">
            <div class="form-group">
                <label>Username</label>
                <input type="text" id="username" required placeholder="Pilih username unik">
            </div>
            <div class="form-group">
                <label>Password</label>
                <input type="password" id="password" required placeholder="••••••••">
            </div>
            <div class="form-group">
                <label>Nama Toko</label>
                <input type="text" id="shop_name" required placeholder="Contoh: Baso Kriting">
            </div>
            <div class="form-group">
                <label>Nomor WhatsApp Bot</label>
                <input type="text" id="bot_number" required placeholder="62812345678">
                <small style="color: #64748b; font-size: 0.75rem; display: block; margin-top: 0.35rem;">* Gunakan format angka saja diawali 62</small>
            </div>
            <button type="submit" class="btn-register">
                Buat Akun Sekarang
            </button>
            <div class="footer-link">
                Sudah punya akun? <a href="/login">Login</a>
            </div>
        </form>
    </div>

    <script>
        document.getElementById('registerForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const payload = {
                username: document.getElementById('username').value,
                password: document.getElementById('password').value,
                shop_name: document.getElementById('shop_name').value,
                bot_number: document.getElementById('bot_number').value
            };

            const errorMsg = document.getElementById('errorMsg');
            const successMsg = document.getElementById('successMsg');
            const submitBtn = e.target.querySelector('button');

            errorMsg.style.display = 'none';
            successMsg.style.display = 'none';
            submitBtn.disabled = true;
            submitBtn.innerText = 'Memproses...';

            try {
                const res = await fetch('/api/auth/register', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(payload)
                });

                const data = await res.json();

                if (data.success) {
                    successMsg.innerText = data.message;
                    successMsg.style.display = 'block';
                    document.getElementById('registerForm').reset();
                    setTimeout(() => window.location.href = '/login', 2500);
                } else {
                    errorMsg.innerText = data.message || 'Registrasi gagal';
                    errorMsg.style.display = 'block';
                    submitBtn.disabled = false;
                    submitBtn.innerText = 'Buat Akun Sekarang';
                }
            } catch (err) {
                errorMsg.innerText = 'Terjadi kesalahan koneksi ke server.';
                errorMsg.style.display = 'block';
                submitBtn.disabled = false;
                submitBtn.innerText = 'Buat Akun Sekarang';
            }
        });
    </script>
</body>
</html>
