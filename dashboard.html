<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Order Dashboard | WhatsApp Bot</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <div class="app-container">
        <!-- Sidebar Navigation -->
        <aside class="sidebar">
            <div class="sidebar-header">
                <div class="logo-box">
                    <span class="logo-icon">🌿</span>
                    <span class="logo-text">OrderBot</span>
                </div>
            </div>
            <nav class="sidebar-menu">
                <button class="menu-item active" onclick="showTab('ordersTab')" id="nav-orders">
                    <span class="icon">📦</span> Pesanan
                </button>
                <button class="menu-item" onclick="showTab('configTab'); toggleConfigSubmenu();" id="nav-config">
                    <span class="icon">⚙️</span> Konfigurasi
                </button>
                <div id="config-submenu" style="display: none; flex-direction: column; gap: 0.5rem; padding-left: 2rem; margin-top: -0.5rem; margin-bottom: 0.5rem;">
                    <button class="sub-menu-item active" onclick="showSubTab('sub_menuTab');" id="menu-products">
                        <span class="icon">📋</span> Manajemen Produk
                    </button>
                    <button class="sub-menu-item" onclick="showSubTab('sub_settingsTab');" id="menu-profile">
                        <span class="icon">🏢</span> Profil Toko
                    </button>
                </div>
            </nav>
            <div class="sidebar-footer">
                <div class="status-indicator">
                    <span class="dot live"></span> Live System
                </div>
            </div>
        </aside>

        <!-- Main Content -->
        <main class="main-content">
            <header class="top-bar">
                <div class="page-info">
                    <h1 id="shop_name_display">Loading...</h1>
                    <p id="shop_slogan_display">Pusatnya Kulineran</p>
                </div>
                <div class="top-actions">
                    <button class="btn btn-danger" onclick="logout()">Logout</button>
                </div>
            </header>



            <div class="content-scroll">
                <!-- Tab: Daftar Pesanan -->
                <section id="ordersTab" class="tab-content active">
                    <div class="stats-grid">
                        <div class="stat-card total">
                            <label>Total Pesanan</label>
                            <div id="stat_totalOrders" class="stat-value">0</div>
                        </div>
                        <div class="stat-card revenue">
                            <label>Omzet Total</label>
                            <div id="stat_totalRevenue" class="stat-value">Rp 0</div>
                        </div>
                        <div class="stat-card pending">
                            <label>Pending</label>
                            <div id="stat_pendingOrders" class="stat-value">0</div>
                        </div>
                        <div class="stat-card processing">
                            <label>Diproses</label>
                            <div id="stat_processingOrders" class="stat-value">0</div>
                        </div>
                        <div class="stat-card completed">
                            <label>Selesai</label>
                            <div id="stat_completedOrders" class="stat-value">0</div>
                        </div>
                    </div>

                    <div class="table-container shadow-card">
                        <div class="table-header">
                            <h2>Pesanan Terakhir</h2>
                            <div class="table-actions">
                                <button class="btn btn-sm btn-outline" onclick="fetchOrders()">🔄 Refresh</button>
                                <button class="btn btn-sm btn-success" onclick="exportCSV()">📊 Ekspor CSV</button>
                                <input type="text" placeholder="Cari pesanan..." class="search-input" onkeyup="searchTable(this)">
                            </div>
                        </div>
                        <div class="orders-section">
                            <table id="ordersTable">
                                <thead>
                                    <tr>
                                        <th>ID Order</th>
                                        <th>Customer</th>
                                        <th>Item</th>
                                        <th>Total</th>
                                        <th>Alamat</th>
                                        <th>Status</th>
                                        <th>Aksi</th>
                                    </tr>
                                </thead>
                                <tbody>
                                    <!-- Data via JS -->
                                </tbody>
                            </table>
                        </div>
                    </div>
                </section>

                <!-- Tab: Konfigurasi -->
                <section id="configTab" class="tab-content">
                    <div class="config-container">

                        
                        <div class="config-main">
                            <!-- SubTab: Menu Management -->
                            <div id="sub_menuTab" class="sub-tab-content active">
                                <div class="section-header">
                                    <h2>Daftar Produk</h2>
                                    <button class="btn btn-primary" onclick="openProductModal()">+ Tambah Produk</button>
                                </div>
                                <div id="productList" class="product-grid">
                                    <!-- Data via JS -->
                                </div>
                            </div>

                            <!-- SubTab: Store Settings -->
                            <div id="sub_settingsTab" class="sub-tab-content">
                                <div class="section-header">
                                    <h2>Pengaturan Profil Toko</h2>
                                </div>
                                <form id="settingsForm" class="settings-form shadow-card">
                                    <div class="form-group">
                                        <label>Nama Toko</label>
                                        <input type="text" id="set_shopName" placeholder="Nama bisnismu">
                                    </div>
                                    <div class="form-group">
                                        <label>Slogan / Deskripsi</label>
                                        <input type="text" id="set_shopSlogan" placeholder="Deskripsi singkat">
                                    </div>

                                    <div class="form-group highlight-bot">
                                        <label>Nomor WhatsApp Bot (Utama)</label>
                                        <div class="input-with-badge">
                                            <input type="text" id="set_botNumber" placeholder="628xxxx">
                                            <div id="inlinePairingCode" class="pairing-badge" style="display: none;">
                                                LINK CODE: <span id="inlinePairingCodeBox"></span>
                                            </div>
                                        </div>
                                        <div class="settings-footer-links">
                                            <span class="help-text">Gunakan format 62 tanpa + (Contoh: 6285811095694).</span>
                                            <a href="javascript:void(0)" onclick="resetWhatsAppSession()" class="reset-link">⚠️ Reset Sesi & Minta Kode Baru</a>
                                        </div>
                                    </div>
                                    <button type="submit" class="btn btn-success btn-block">Simpan Perubahan</button>
                                </form>
                            </div>
                        </div>
                    </div>
                </section>
            </div>
        </main>
    </div>

    <!-- Product Modal -->
    <div id="productModal" class="modal">
        <div class="modal-content">
            <h3 id="modalTitle">Tambah Produk</h3>
            <form id="productForm">
                <input type="hidden" id="prod_id">
                <div class="form-group">
                    <label>Nama Produk</label>
                    <input type="text" id="prod_name" required>
                </div>
                <div class="form-group">
                    <label>Harga (Rp)</label>
                    <input type="number" id="prod_price" required>
                </div>
                <div class="form-group">
                    <label>Deskripsi</label>
                    <textarea id="prod_description"></textarea>
                </div>
                <div class="form-group">
                    <label>Stok</label>
                    <select id="prod_stock">
                        <option value="true">Tersedia</option>
                        <option value="false">Habis</option>
                    </select>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-outline" onclick="closeModal()">Batal</button>
                    <button type="submit" class="btn btn-primary">Simpan Produk</button>
                </div>
            </form>
        </div>
    </div>

    <script src="/socket.io/socket.io.js"></script>
    <script src="js/dashboard.js"></script>
</body>
</html>
